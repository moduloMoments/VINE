name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update npm
        run: npm install -g npm@latest

      - name: Verify package version matches release tag
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Smoke test
        run: |
          mkdir /tmp/vine-test && cd /tmp/vine-test
          node "$GITHUB_WORKSPACE/bin/cli.js"
          test -f .claude/commands/vine/verify.md
          echo "Smoke test passed"

      - name: Publish with provenance (dry run for manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: npm publish --provenance --access public --dry-run

      - name: Publish with provenance
        if: github.event_name == 'release'
        run: npm publish --provenance --access public
